<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vigía Científico</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

  <!-- ENCABEZADO -->
  <header class="encabezado">
    <div class="encabezado-contenido">
      <a href="index.html" class="logo">VIGÍA<span> CIENTÍFICO</span></a>
      <nav class="nav-principal">
        <a href="#">Últimas noticias</a>
        <a href="#">Escolares</a>
        <a href="#">Salud</a>
        <a href="#">Tecnología</a>
        <a href="#">Medio ambiente</a>
      </nav>
    </div>
  </header>

  <main class="contenedor">

    <!-- SECCIÓN: ÚLTIMAS NOTICIAS -->
    <!-- Los artículos se insertan dinámicamente desde Firestore via articulos.js -->
    <section class="seccion">
      <h2 class="seccion-titulo">ÚLTIMAS NOTICIAS</h2>
      <div class="grid-principal">
        <article id="articulo-destacado" class="articulo articulo-grande">
          <div class="articulo-overlay">
            <p class="articulo-titulo"></p>
          </div>
        </article>
        <div id="grid-secundario" class="grid-secundario">
          <article class="articulo"><div class="articulo-overlay"><p class="articulo-titulo"></p></div></article>
          <article class="articulo"><div class="articulo-overlay"><p class="articulo-titulo"></p></div></article>
          <article class="articulo"><div class="articulo-overlay"><p class="articulo-titulo"></p></div></article>
          <article class="articulo"><div class="articulo-overlay"><p class="articulo-titulo"></p></div></article>
        </div>
      </div>
    </section>

    <!-- SECCIÓN: CIENCIA Y TECNOLOGÍA -->
    <!-- Los artículos se insertan dinámicamente desde Firestore via articulos.js -->
    <section class="seccion">
      <h2 class="seccion-titulo">CIENCIA Y TECNOLOGÍA</h2>
      <div id="grid-ciencia" class="grid-dos">
        <article class="articulo articulo-mediano"><div class="articulo-overlay"><p class="articulo-titulo"></p></div></article>
        <article class="articulo articulo-mediano"><div class="articulo-overlay"><p class="articulo-titulo"></p></div></article>
      </div>
    </section>

    <!-- SECCIÓN: TE PUEDE INTERESAR -->
    <!-- Las tarjetas se insertan dinámicamente desde Firestore via articulos.js -->
    <section class="seccion interesar">
      <h3 class="interesar-titulo">Te puede interesar...</h3>

      <div class="tabs">
        <button class="tab activo" data-categoria="investigacion">INVESTIGACIÓN</button>
        <button class="tab" data-categoria="salud">SALUD</button>
        <button class="tab" data-categoria="tecnologia">TECNOLOGÍA</button>
        <button class="tab" data-categoria="academia">ACADEMIA</button>
        <button class="tab" data-categoria="ambiente">MEDIO AMBIENTE</button>
      </div>

      <div class="carrusel-contenedor">
        <button class="carrusel-btn carrusel-prev" aria-label="Anterior">&#8249;</button>
        <div id="carrusel" class="carrusel"></div>
        <button class="carrusel-btn carrusel-next" aria-label="Siguiente">&#8250;</button>
      </div>

    </section>

  </main>

  <footer class="pie">
    <p>© 2026 Vigía Científico — Ciencia al alcance de todos</p>
  </footer>

  <script src="js/articulos.js"></script>
</body>
</html>
