<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso — Vigía Científico</title>
  <link rel="stylesheet" href="../css/estilos.css">
  <style>
    .login-contenedor {
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    .login-caja {
      background: #fff;
      border-radius: 4px;
      padding: 40px 48px;
      text-align: center;
      width: 100%;
      max-width: 380px;
    }
    .login-titulo {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--rojo);
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }
    .login-subtitulo {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 28px;
    }
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      background: #fff;
      border-radius: 2px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-google:hover { background: #f5f5f5; }
    .btn-google svg { width: 20px; height: 20px; }
    .login-error {
      color: var(--rojo);
      font-size: 0.82rem;
      margin-top: 16px;
      display: none;
    }
    .login-cargando {
      font-size: 0.85rem;
      color: #888;
      margin-top: 16px;
      display: none;
    }
  </style>
</head>
<body>

  <header class="encabezado">
    <div class="encabezado-contenido">
      <a href="../index.html" class="logo">VIGÍA<span> CIENTÍFICO</span></a>
    </div>
  </header>

  <main class="contenedor login-contenedor">
    <div class="login-caja">
      <p class="login-titulo">ACCESO EDITORIAL</p>
      <p class="login-subtitulo">Solo para escritores y editores del portal</p>

      <button class="btn-google" id="btn-google">
        <!-- Ícono Google -->
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.7 2.5 30.2 0 24 0 14.6 0 6.6 5.4 2.7 13.3l7.8 6C12.4 13 17.8 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 6.9-10 6.9-17z"/>
          <path fill="#FBBC05" d="M10.5 28.7A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7l-7.8-6A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.7 10.7l7.8-6z"/>
          <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.2 0-11.5-4.2-13.4-9.9l-7.8 6C6.6 42.6 14.6 48 24 48z"/>
        </svg>
        Entrar con Google
      </button>

      <p class="login-error" id="login-error"></p>
      <p class="login-cargando" id="login-cargando">Verificando acceso...</p>
    </div>
  </main>

  <script type="module">
    import { auth, db }              from "../js/firebase.js";
    import { GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import { doc, getDoc }           from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const btnGoogle    = document.getElementById("btn-google");
    const mensajeError = document.getElementById("login-error");
    const cargando     = document.getElementById("login-cargando");

    function mostrarError(texto) {
      mensajeError.textContent = texto;
      mensajeError.style.display = "block";
      cargando.style.display = "none";
    }

    btnGoogle.addEventListener("click", async () => {
      mensajeError.style.display = "none";
      cargando.style.display = "block";
      btnGoogle.disabled = true;

      try {
        const proveedor = new GoogleAuthProvider();
        const resultado = await signInWithPopup(auth, proveedor);
        const uid       = resultado.user.uid;

        // Verificar si el usuario tiene rol asignado
        const refUsuario = doc(db, "usuarios", uid);
        const snapUsuario = await getDoc(refUsuario);

        if (!snapUsuario.exists()) {
          await auth.signOut();
          mostrarError("Tu cuenta no tiene acceso al portal. Contacta al administrador.");
          btnGoogle.disabled = false;
          return;
        }

        const rolUsuario = snapUsuario.data().rol;

        if (rolUsuario === "escritor") {
          window.location.href = "escritor.html";
        } else if (rolUsuario === "editor") {
          window.location.href = "editor.html";
        } else {
          await auth.signOut();
          mostrarError("Rol no reconocido. Contacta al administrador.");
          btnGoogle.disabled = false;
        }

      } catch (error) {
        mostrarError("Error al iniciar sesión. Intenta de nuevo.");
        btnGoogle.disabled = false;
        console.error(error);
      }
    });
  </script>

</body>
</html>
