<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso — Vigía Científico</title>
  <link rel="stylesheet" href="../css/estilos.css">
  <style>
    .login-contenedor {
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .login-caja {
      background: #fff;
      border-radius: 4px;
      padding: 40px 48px;
      width: 100%;
      max-width: 380px;
    }
    .login-titulo {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--rojo);
      margin-bottom: 6px;
      letter-spacing: 0.05em;
      text-align: center;
    }
    .login-subtitulo {
      font-size: 0.82rem;
      color: #888;
      margin-bottom: 28px;
      text-align: center;
    }
    .campo {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }
    .campo label {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #444;
    }
    .campo input {
      border: 1px solid #ddd;
      padding: 10px 12px;
      font-size: 0.9rem;
      font-family: inherit;
      border-radius: 2px;
      transition: border-color 0.2s;
    }
    .campo input:focus {
      outline: none;
      border-color: var(--rojo);
    }
    .btn-entrar {
      width: 100%;
      background: var(--rojo);
      color: #fff;
      border: none;
      padding: 11px;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      border-radius: 2px;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .btn-entrar:hover    { opacity: 0.85; }
    .btn-entrar:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-error {
      color: var(--rojo);
      font-size: 0.82rem;
      margin-top: 14px;
      text-align: center;
      display: none;
    }
    .login-cargando {
      font-size: 0.82rem;
      color: #888;
      margin-top: 14px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>

  <header class="encabezado">
    <div class="encabezado-contenido">
      <a href="../index.html" class="logo">VIGÍA<span> CIENTÍFICO</span></a>
    </div>
  </header>

  <main class="contenedor login-contenedor">
    <div class="login-caja">
      <p class="login-titulo">ACCESO EDITORIAL</p>
      <p class="login-subtitulo">Solo para escritores y editores del portal</p>

      <form id="form-login">
        <div class="campo">
          <label for="correo">Correo</label>
          <input type="email" id="correo" required autocomplete="email" placeholder="correo@ejemplo.com">
        </div>
        <div class="campo">
          <label for="contrasena">Contraseña</label>
          <input type="password" id="contrasena" required autocomplete="current-password" placeholder="••••••••">
        </div>
        <button type="submit" class="btn-entrar" id="btn-entrar">Entrar</button>
      </form>

      <p class="login-error"   id="login-error"></p>
      <p class="login-cargando" id="login-cargando">Verificando acceso...</p>
    </div>
  </main>

  <script type="module">
    import { auth, db }                              from "../js/firebase.js";
    import { signInWithEmailAndPassword }            from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import { doc, getDoc }                           from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const formLogin    = document.getElementById("form-login");
    const btnEntrar    = document.getElementById("btn-entrar");
    const mensajeError = document.getElementById("login-error");
    const cargando     = document.getElementById("login-cargando");

    function mostrarError(texto) {
      mensajeError.textContent  = texto;
      mensajeError.style.display = "block";
      cargando.style.display    = "none";
      btnEntrar.disabled        = false;
    }

    formLogin.addEventListener("submit", async (e) => {
      e.preventDefault();
      mensajeError.style.display = "none";
      cargando.style.display     = "block";
      btnEntrar.disabled         = true;

      const correo     = document.getElementById("correo").value.trim();
      const contrasena = document.getElementById("contrasena").value;

      try {
        const resultado = await signInWithEmailAndPassword(auth, correo, contrasena);
        const uid       = resultado.user.uid;

        // Verificar rol en Firestore
        const snap = await getDoc(doc(db, "usuarios", uid));

        if (!snap.exists()) {
          await auth.signOut();
          mostrarError("Tu cuenta no tiene acceso al portal. Contacta al administrador.");
          return;
        }

        const rolUsuario = snap.data().rol;

        if (rolUsuario === "escritor") {
          window.location.href = "escritor.html";
        } else if (rolUsuario === "editor") {
          window.location.href = "editor.html";
        } else if (rolUsuario === "admin") {
          window.location.href = "admin.html";
        } else {
          await auth.signOut();
          mostrarError("Rol no reconocido. Contacta al administrador.");
        }

      } catch (error) {
        // Mensajes de error legibles en español
        const codigos = {
          "auth/invalid-credential":   "Correo o contraseña incorrectos.",
          "auth/user-not-found":        "No existe una cuenta con ese correo.",
          "auth/wrong-password":        "Contraseña incorrecta.",
          "auth/too-many-requests":     "Demasiados intentos. Espera unos minutos.",
          "auth/user-disabled":         "Esta cuenta ha sido deshabilitada.",
        };
        mostrarError(codigos[error.code] ?? "Error al iniciar sesión. Intenta de nuevo.");
        console.error(error);
      }
    });
  </script>

</body>
</html>
