<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Editor — Vigía Científico</title>
  <link rel="stylesheet" href="../css/estilos.css">
  <link rel="stylesheet" href="../css/panel.css">
</head>
<body>

  <header class="encabezado">
    <div class="encabezado-contenido">
      <a href="../index.html" class="logo">VIGÍA<span> CIENTÍFICO</span></a>
      <div class="panel-usuario">
        <span id="nombre-usuario"></span>
        <button id="btn-salir" class="btn-salir">Salir</button>
      </div>
    </div>
  </header>

  <main class="contenedor">

    <!-- Lista de borradores pendientes -->
    <section class="seccion">
      <h2 class="seccion-titulo">BORRADORES PENDIENTES</h2>
      <div id="lista-borradores" class="lista-articulos">
        <p class="lista-vacia">Cargando...</p>
      </div>
    </section>

    <!-- Edición y publicación del artículo seleccionado -->
    <section id="detalle-seccion" class="seccion" style="display:none;">
      <h2 class="seccion-titulo">EDITAR Y PUBLICAR</h2>

      <div class="detalle-contenedor">

        <!-- Imagen principal -->
        <div class="editor-bloque">
          <p class="editor-bloque-label">IMAGEN PRINCIPAL (PORTADA)</p>
          <img id="detalle-imagen" src="" alt="Portada" class="detalle-imagen">
        </div>

        <!-- Título editable -->
        <div class="campo">
          <label for="editor-titulo">Título</label>
          <input type="text" id="editor-titulo" maxlength="200">
        </div>

        <!-- Categoría y fuente (solo lectura informativa) -->
        <div class="editor-meta-fila">
          <p><strong>Categoría:</strong> <span id="detalle-categoria"></span></p>
          <p id="detalle-fuente-row" style="display:none;">
            <strong>Fuente:</strong> <a id="detalle-fuente" href="#" target="_blank" rel="noopener">ver artículo original</a>
          </p>
        </div>

        <!-- Contenido editable -->
        <div class="campo">
          <label for="editor-contenido">Texto del artículo</label>
          <textarea id="editor-contenido" rows="14" maxlength="50000"></textarea>
        </div>

        <!-- Imagen 2 (opcional) -->
        <div id="bloque-imagen2" class="editor-bloque" style="display:none;">
          <p class="editor-bloque-label">IMAGEN 2 — se mostrará a la mitad del artículo</p>
          <img id="detalle-imagen2" src="" alt="Imagen 2" class="detalle-imagen">
        </div>

        <!-- Imagen 3 (opcional) -->
        <div id="bloque-imagen3" class="editor-bloque" style="display:none;">
          <p class="editor-bloque-label">IMAGEN 3 — se mostrará al final del artículo</p>
          <img id="detalle-imagen3" src="" alt="Imagen 3" class="detalle-imagen">
        </div>

        <div class="detalle-acciones">
          <p class="form-estado" id="detalle-estado"></p>
          <button class="btn-secundario" id="btn-cerrar-detalle">Volver</button>
          <button class="btn-primario"   id="btn-publicar">Publicar artículo</button>
        </div>

      </div>
    </section>

  </main>

  <script type="module" src="../js/editor.js"></script>
</body>
</html>
